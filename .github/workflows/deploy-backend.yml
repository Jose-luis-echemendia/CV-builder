name: Backend CI/CD

on:
  push:
    branches:
      - prod
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches:
      - prod
    paths:
      - 'backend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  test:
    name: Linter & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    # Dependencias de servicios (PostgreSQL + Redis) para los tests locales
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true
          version: "latest"

      - name: Install Dependencies
        run: uv sync

      - name: Lint and Format verification (Ruff)
        run: ./scripts/lint.sh
        continue-on-error: true

      - name: Run Tests
        env:
          ENVIRONMENT: testing
          FIRST_SUPERUSER: admin@example.com
          FIRST_SUPERUSER_PASSWORD: changethis
          POSTGRES_SERVER: localhost
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: app_test
          POSTGRES_PORT: 5432
          REDIS_HOST: localhost
          SECRET_KEY: test_secret_key_123
        run: |
          uv run pytest app/tests/ -v

  deploy:
    name: Build & Deploy
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Despliegue Remoto en el servidor usando SSH (Docker Compose)
      - name: Trigger Remote Deploy
        uses: appleboy/ssh-action@v1.0.3
        if: ${{ secrets.SERVER_HOST != '' }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/cv-builder
            docker-compose -f docker-compose.prod.yml pull backend celery_worker
            docker-compose -f docker-compose.prod.yml up -d backend celery_worker

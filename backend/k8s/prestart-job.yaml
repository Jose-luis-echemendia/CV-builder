apiVersion: batch/v1
kind: Job
metadata:
  name: cv-prestart
spec:
  template:
    spec:
      # --- CONTENEDOR INIT ---
      initContainers:
        - name: create-db-if-not-exists
          image: postgres:15-alpine # Imagen ligera que tiene el comando 'psql'
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cv-secrets # Usamos tu secreto actual
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              # 1. Intentamos ver si la base de datos 'cv' existe en el servidor
              # 2. Si no existe, la creamos
              psql -h postgres-service -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'cv'" | grep -q 1 || \
              psql -h postgres-service -U postgres -d postgres -c "CREATE DATABASE cv"

      # --- TU CONTENEDOR PRINCIPAL ---
      containers:
        - name: prestart
          image: jose031003/fastapi-cv-builder:latest
          imagePullPolicy: Always
          command: ["/bin/bash", "scripts/prestart.sh"]
          envFrom:
            - configMapRef: { name: cv-config }
            - secretRef: { name: cv-secrets }

      restartPolicy: OnFailure
